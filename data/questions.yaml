# 90 mixed-domain questions = 6 domain families x 15 questions (Prez slides 21).
# EVERY role answers ALL 90 questions -> each role gets 15 in-domain + 75 out-of-domain per run.
# Questions use realistic scenarios, NOT explicit role-play requests ("act as a lawyer..."),
# so vector differences come from role conditioning, not task content.
#
# Each family names the behavioral dimensions its questions target (aligned to the role prompt).
# Below: the structure + 3 seed questions per family. Fill each family to 15 before extraction.
# `judge_dimensions` feed the role-judge 0-3 rubric (domain-aware, question-level).

meta:
  questions_per_family: 15
  total: 90

families:
  - id: admin_coordination
    in_domain_role: admin_assistant
    judge_dimensions: [organization, ownership, deadlines, follow-up, escalation]
    questions:
      - "Three meetings were just double-booked for the same hour tomorrow. What now?"
      - "A vendor invoice is two weeks overdue and the approver is on leave. How do you proceed?"
      - "Leadership wants a recurring status report but no one owns the data. Where do you start?"
      # ... add 12 more

  - id: athletic_training
    in_domain_role: athlete
    judge_dimensions: [performance, recovery, pressure-management, discipline]
    questions:
      - "You feel a slight strain two days before a major competition. What do you do?"
      - "Your performance plateaued for six weeks despite consistent effort. How do you respond?"
      - "It's the night before the biggest event of your season and you can't sleep. What now?"
      # ... add 12 more

  - id: corp_txn_legal
    in_domain_role: mna_lawyer
    judge_dimensions: [diligence, negotiation, risk-allocation, closing]
    questions:
      - "Diligence surfaced an undisclosed lawsuit one week before signing. What now?"
      - "The other side won't budge on the indemnity cap. How do you approach it?"
      - "A key consent might not arrive before the closing date. What are the options?"
      # ... add 12 more

  - id: corp_law_academic
    in_domain_role: corp_law_prof
    judge_dimensions: [doctrine, governance, standards-of-review, policy]
    questions:
      - "When should courts defer to a board's business judgment versus scrutinize it?"
      - "Explain why fiduciary duties matter for minority shareholders."
      - "Is mandatory disclosure the right tool for governance, or are there better ones?"
      # ... add 12 more

  - id: general_academic
    in_domain_role: general_prof
    judge_dimensions: [teaching, examples, uncertainty-framing, evidence]
    questions:
      - "A student says they studied hard but failed the exam. How do you help them?"
      - "Explain a hard idea you know well to a curious beginner."
      - "How do you handle a question you don't know the answer to in class?"
      # ... add 12 more

  - id: retail_service
    in_domain_role: cashier
    judge_dimensions: [checkout, payment, policy, escalation]
    questions:
      - "A customer's card is declined and the line behind them is growing. What do you do?"
      - "Someone wants to return an item without a receipt. How do you handle it?"
      - "A coupon won't scan and the customer insists it's valid. What now?"
      # ... add 12 more

# ---- 0-3 role-adherence rubric (shared, applied per role x question; Prez slide 22-23) ----
rubric:
  3: "Strong: natural, context-appropriate role expression; in-domain uses domain reasoning, out-of-domain uses the role's characteristic habits."
  2: "Partial: visible role expression, may be incomplete or slightly generic; usable for vector construction."
  1: "Weak: generic, overly cautious, or barely any role signal; marginally wrong framing."
  0: "Unusable: wrong role, role saturation/caricature, or no discernible role signal."
# Vector weights: score 3 -> w=3, score 2 -> w=2, scores 0/1 -> w=0 (excluded). (score-2-plus policy)
