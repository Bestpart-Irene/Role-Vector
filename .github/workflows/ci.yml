name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install (core deps only — dummy backend needs no model)
        run: pip install numpy pyyaml pytest

      - name: Unit tests
        run: PYTHONPATH=src pytest -q tests/

      - name: Validation gate (full roadmap, dummy backend)
        # run_all exits non-zero if any required check fails -> this step gates the build
        run: PYTHONPATH=src python -m rolevec.run_all --quick

      - name: Upload run report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-report
          path: runs/report.md
          if-no-files-found: ignore
